name: "测试用例提交"
description: 为 LLM Test 贡献新的测试用例 —— 社区驱动的核心
title: "[测试用例] "
labels: ["test-case"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 LLM Test 贡献测试用例！测试用例是平台的核心生命力，你的贡献将帮助更多人评估 AI 模型的实际能力。

  - type: input
    id: case-name
    attributes:
      label: 测试用例名称
      description: 简短、清晰的名称，例如"洗车问题"、"大扫除制度"
      placeholder: "洗车问题"
    validations:
      required: true

  - type: textarea
    id: case-description
    attributes:
      label: 测试用例描述
      description: 这个测试场景考察 AI 哪方面的能力？
      placeholder: "考察 AI 对日常常识场景的推理判断能力..."
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: 难度级别
      description: 选择此测试用例的难度
      options:
        - easy（简单）
        - medium（中等）
        - hard（困难）
      default: 0
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: 提示词 (Prompt)
      description: 提交给 AI 模型的完整提示词，应包含明确的判断要求
      placeholder: "去离家五十米的洗车店洗车，应该开车去还是走路去？请做出判断。"
    validations:
      required: true

  - type: textarea
    id: expected-answer
    attributes:
      label: 预期答案
      description: AI 模型应该做出的正确判断是什么？以结构化方式描述
      placeholder: |
        例如：
        - 期望输出参数：{"transportation": "开车去"}
        - 期望输出参数：{"judgment": "不合理"}
    validations:
      required: true

  - type: textarea
    id: scoring-rationale
    attributes:
      label: 评分依据（可选）
      description: 为什么这个测试用例能有效评估 AI 的推理能力？评判标准是什么？

  - type: markdown
    attributes:
      value: |
        ---
        ### 提示：如果你熟悉项目格式
        可直接按 JSON 格式提供完整定义（参考 `front/src/test-suite/v1/cases/` 下的现有用例），粘贴到下方文本框中：

        ```json
        {
          "id": "tc_your_id",
          "title": "用例名称",
          "description": "用例描述",
          "difficulty": "easy",
          "prompt": "提示词内容",
          "parameters": {
            "type": "object",
            "properties": {
              "answer": {
                "type": "string",
                "description": "参数描述",
                "enum": ["选项A", "选项B"]
              },
              "reason": {
                "type": "string",
                "description": "理由描述"
              }
            },
            "required": ["answer"]
          },
          "verify": {
            "arguments": {
              "answer": "选项A"
            }
          }
        }
        ```
