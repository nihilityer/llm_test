name: "功能建议"
description: 为 LLM Test 提出新功能或改进建议
title: "[建议] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 LLM Test 提出改进建议！

  - type: textarea
    id: problem
    attributes:
      label: 你的建议与什么问题相关？
      description: 清晰简洁地描述当前遇到的问题或使用不便的场景
      placeholder: "例如：当我想对比两个模型的测试结果时，需要来回切换页面非常麻烦..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 清晰描述你希望看到什么功能或改进
      placeholder: "希望能在一个页面上同时展示两个模型的评分对比..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案（可选）
      description: 清晰描述你考虑过的任何替代方案

  - type: textarea
    id: additional
    attributes:
      label: 额外信息
      description: 任何有助于理解此建议的上下文或截图
